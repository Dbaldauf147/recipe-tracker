name: iOS Build & TestFlight

on:
  push:
    paths:
      - 'ios/**'
    branches: [master]
  workflow_dispatch: # allows manual trigger

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Decode GoogleService-Info.plist
        run: |
          mkdir -p ios/PrepDayScanner/PrepDayScanner/Resources
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/PrepDayScanner/PrepDayScanner/Resources/GoogleService-Info.plist

      - name: Generate Xcode project
        working-directory: ios/PrepDayScanner
        run: xcodegen generate

      - name: Resolve Swift packages
        working-directory: ios/PrepDayScanner
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PrepDayScanner.xcodeproj \
            -scheme PrepDayScanner

      - name: Build for testing (no signing)
        working-directory: ios/PrepDayScanner
        run: |
          xcodebuild build \
            -project PrepDayScanner.xcodeproj \
            -scheme PrepDayScanner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20

