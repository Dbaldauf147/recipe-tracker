# DO NOT USE THIS PROJECT.
# It is the abandoned Swift / SwiftUI project formerly known as
# PrepDayScanner. The user's actual mobile app is the Expo project at
# OneDrive/Desktop/PrepDay (bundle id com.sundayroutine.prepday).
# See IGNORE_THIS_PROJECT.md in this directory.
name: IgnoreThisProject
options:
  bundleIdPrefix: com.sundayroutine
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    majorVersion: 8.0.0

targets:
  IgnoreThisProject:
    type: application
    platform: iOS
    sources:
      - IgnoreThisProject_src
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sundayroutine.ignorethisproject
        INFOPLIST_FILE: IgnoreThisProject_src/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
