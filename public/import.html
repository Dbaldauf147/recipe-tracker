    let existingRecipes = [];
    let newRecipes = [];
    let currentUser = null;

    function showStatus(msg, type = 'info') {
      const box = document.getElementById('statusBox');
      box.textContent = msg;
      box.className = 'status status-' + type;
      box.style.display = 'block';
    }

    window.signIn = async function() {
      try {
        showStatus('Signing in...');
        const result = await signInWithPopup(auth, new GoogleAuthProvider());
        currentUser = result.user;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('userInfo').innerHTML = `
          ${currentUser.photoURL ? `<img src="${currentUser.photoURL}" />` : ''}
          <div>
            <div class="user-name">${currentUser.displayName || ''}</div>
            <div class="user-email">${currentUser.email}</div>
          </div>
        `;

        // Load existing recipes
        showStatus('Loading existing recipes...');
        const recipesRef = doc(db, 'users', currentUser.uid, 'data', 'recipes');
        const snap = await getDoc(recipesRef);
        existingRecipes = snap.exists() ? (snap.data().recipes || []) : [];

        // Determine which imported recipes are new
        const existingTitles = new Set(existingRecipes.map(r => r.title.toLowerCase().trim()));
        const existingIds = new Set(existingRecipes.map(r => r.id));
        newRecipes = IMPORT_RECIPES.filter(r => {
          return !existingTitles.has(r.title.toLowerCase().trim()) && !existingIds.has(r.id);
        });

        const skipCount = IMPORT_RECIPES.length - newRecipes.length;

        document.getElementById('newCount').textContent = newRecipes.length;
        document.getElementById('skipCount').textContent = skipCount > 0
          ? `(${skipCount} already exist and will be skipped)`
          : '';

        // Render list
        const list = document.getElementById('recipeList');
        list.innerHTML = newRecipes.map(r =>
          `<div class="recipe-item"><span>${r.title}</span><span class="recipe-cat">${r.category} · ${r.ingredients.length} ingredients</span></div>`
        ).join('');

        document.getElementById('summary').textContent =
          `Existing: ${existingRecipes.length} recipes. After import: ${existingRecipes.length + newRecipes.length} recipes.`;

        document.getElementById('step2').style.display = 'block';
        showStatus(`Found ${existingRecipes.length} existing recipes. ${newRecipes.length} new to import.`);
      } catch (err) {
        showStatus('Sign in failed: ' + err.message, 'error');
      }
    };

    window.doImport = async function() {
      if (newRecipes.length === 0) {
        showStatus('No new recipes to import!', 'info');
        return;
      }
      const btn = document.getElementById('importBtn');
      btn.disabled = true;
      btn.textContent = 'Importing...';
      try {
        showStatus(`Importing ${newRecipes.length} recipes...`);
        const merged = [...existingRecipes, ...newRecipes];
        const recipesRef = doc(db, 'users', currentUser.uid, 'data', 'recipes');
        await setDoc(recipesRef, { recipes: merged }, { merge: false });
        showStatus(`Done! Imported ${newRecipes.length} recipes. Total: ${merged.length}.`, 'success');
        btn.textContent = 'Imported!';
      } catch (err) {
        showStatus('Import failed: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Retry Import';
      }
    };
  </script>
</body>
</html>
