<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ef; color: #2c2520; padding: 1.5rem; }
    .card { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 1.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #6b7280; font-size: 0.88rem; margin-bottom: 1.25rem; }
    .row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .btn { padding: 0.7rem 1.25rem; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: #fff; color: #4f46e5; border: 1px solid #e0ddf5; }
    .btn-ghost:hover { background: #f5f3ff; }
    .btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
    .drop { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 1.5rem; text-align: center; color: #6b7280; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; margin-bottom: 1rem; }
    .drop:hover, .drop.over { border-color: #4f46e5; background: #f5f3ff; color: #4f46e5; }
    .status { margin-top: 0.25rem; margin-bottom: 1rem; padding: 0.7rem 1rem; border-radius: 10px; font-size: 0.85rem; }
    .status-info { background: #eef2ff; color: #4f46e5; }
    .status-success { background: #dcfce7; color: #166534; }
    .status-error { background: #fee2e2; color: #dc2626; }

    .board { display: grid; grid-template-columns: repeat(9, 1fr); width: 100%; aspect-ratio: 1; border: 3px solid #1f2937; border-radius: 6px; overflow: hidden; margin-bottom: 1rem; touch-action: manipulation; }
    .cell { border: 1px solid #d1d5db; display: flex; }
    .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: clamp(1rem, 5vw, 1.4rem); font-weight: 600; color: #1f2937; background: transparent; outline: none; font-family: inherit; padding: 0; -moz-appearance: textfield; }
    .cell input::-webkit-outer-spin-button, .cell input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .cell input:focus { background: #eef2ff; }
    .cell.given input { color: #1f2937; }
    .cell.solved input { color: #4f46e5; font-weight: 700; }
    .cell.conflict input { color: #dc2626; background: #fee2e2; }
    /* 3x3 box borders */
    .cell:nth-child(3n) { border-right: 2px solid #1f2937; }
    .cell:nth-child(9n) { border-right: none; }
    .board > .cell:nth-child(n+19):nth-child(-n+27),
    .board > .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #1f2937; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sudoku Solver</h1>
    <p class="subtitle">Import a screenshot of a puzzle, fix any misreads, and solve it.</p>

    <input type="file" id="file" accept="image/*" class="hidden">
    <div class="drop" id="drop">
      📷 Tap to upload a screenshot — or drag &amp; drop / paste an image
    </div>

    <div id="status" class="status status-info hidden"></div>

    <div class="board" id="board"></div>

    <div class="row">
      <button class="btn btn-primary" id="solveBtn">Solve</button>
      <button class="btn btn-ghost" id="clearBtn">Clear grid</button>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const fileInput = document.getElementById('file');
    const drop = document.getElementById('drop');
    const solveBtn = document.getElementById('solveBtn');
    const clearBtn = document.getElementById('clearBtn');

    const inputs = []; // 81 input elements, row-major

    // Build the 9x9 grid of inputs.
    for (let i = 0; i < 81; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.inputMode = 'numeric';
      inp.maxLength = 1;
      inp.addEventListener('input', () => {
        // Keep only a single 1-9 digit; mark as a user-given value.
        inp.value = inp.value.replace(/[^1-9]/g, '').slice(0, 1);
        cell.classList.remove('solved');
        cell.classList.toggle('given', inp.value !== '');
        validateBoard();
      });
      // Arrow-key navigation between cells.
      inp.addEventListener('keydown', (e) => {
        const idx = inputs.indexOf(inp);
        let target = -1;
        if (e.key === 'ArrowRight') target = idx + 1;
        else if (e.key === 'ArrowLeft') target = idx - 1;
        else if (e.key === 'ArrowUp') target = idx - 9;
        else if (e.key === 'ArrowDown') target = idx + 9;
        if (target >= 0 && target < 81) { inputs[target].focus(); e.preventDefault(); }
      });
      cell.appendChild(inp);
      boardEl.appendChild(cell);
      inputs.push(inp);
    }

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'status status-' + (kind || 'info');
      statusEl.classList.toggle('hidden', !msg);
    }

    function readGrid() {
      const g = [];
      for (let r = 0; r < 9; r++) {
        const row = [];
        for (let c = 0; c < 9; c++) {
          const v = inputs[r * 9 + c].value;
          row.push(v === '' ? 0 : Number(v));
        }
        g.push(row);
      }
      return g;
    }

    function writeGrid(grid, markGiven) {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const inp = inputs[r * 9 + c];
          const cell = inp.parentElement;
          const v = grid[r][c];
          inp.value = v ? String(v) : '';
          cell.classList.remove('solved', 'conflict');
          cell.classList.toggle('given', markGiven && v !== 0);
        }
      }
    }

    // Highlight cells that break Sudoku rules. Returns true if the board is valid.
    function validateBoard() {
      const g = readGrid();
      inputs.forEach(inp => inp.parentElement.classList.remove('conflict'));
      let ok = true;
      const flag = (r, c) => { inputs[r * 9 + c].parentElement.classList.add('conflict'); ok = false; };
      // Rows & columns.
      for (let i = 0; i < 9; i++) {
        const rowSeen = {}, colSeen = {};
        for (let j = 0; j < 9; j++) {
          const rv = g[i][j];
          if (rv) { if (rowSeen[rv] !== undefined) { flag(i, j); flag(i, rowSeen[rv]); } else rowSeen[rv] = j; }
          const cv = g[j][i];
          if (cv) { if (colSeen[cv] !== undefined) { flag(j, i); flag(colSeen[cv], i); } else colSeen[cv] = j; }
        }
      }
      // 3x3 boxes.
      for (let br = 0; br < 9; br += 3) {
        for (let bc = 0; bc < 9; bc += 3) {
          const seen = {};
          for (let dr = 0; dr < 3; dr++) {
            for (let dc = 0; dc < 3; dc++) {
              const r = br + dr, c = bc + dc, v = g[r][c];
              if (v) { if (seen[v]) { flag(r, c); flag(seen[v][0], seen[v][1]); } else seen[v] = [r, c]; }
            }
          }
        }
      }
      return ok;
    }

    // Backtracking solver. Mutates a copy and returns it, or null if unsolvable.
    function solve(grid) {
      const g = grid.map(row => row.slice());
      function valid(r, c, n) {
        for (let i = 0; i < 9; i++) {
          if (g[r][i] === n || g[i][c] === n) return false;
        }
        const br = r - (r % 3), bc = c - (c % 3);
        for (let dr = 0; dr < 3; dr++)
          for (let dc = 0; dc < 3; dc++)
            if (g[br + dr][bc + dc] === n) return false;
        return true;
      }
      function backtrack() {
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            if (g[r][c] === 0) {
              for (let n = 1; n <= 9; n++) {
                if (valid(r, c, n)) {
                  g[r][c] = n;
                  if (backtrack()) return true;
                  g[r][c] = 0;
                }
              }
              return false;
            }
          }
        }
        return true;
      }
      return backtrack() ? g : null;
    }

    solveBtn.addEventListener('click', () => {
      if (!validateBoard()) {
        setStatus('The puzzle has conflicting numbers (highlighted in red). Fix them first.', 'error');
        return;
      }
      const given = readGrid();
      const solution = solve(given);
      if (!solution) {
        setStatus('No solution exists for this puzzle. Double-check the imported numbers.', 'error');
        return;
      }
      // Write solution, marking cells that were filled in by the solver.
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const inp = inputs[r * 9 + c];
          const cell = inp.parentElement;
          inp.value = String(solution[r][c]);
          if (given[r][c] === 0) { cell.classList.add('solved'); cell.classList.remove('given'); }
          else { cell.classList.add('given'); }
        }
      }
      setStatus('Solved! Your given numbers are dark, the solved cells are purple.', 'success');
    });

    clearBtn.addEventListener('click', () => {
      writeGrid(Array.from({ length: 9 }, () => Array(9).fill(0)), false);
      setStatus('', 'info');
      inputs[0].focus();
    });

    // ---- Image import ----
    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function importImage(file) {
      if (!file || !file.type.startsWith('image/')) {
        setStatus('That doesn\'t look like an image file.', 'error');
        return;
      }
      setStatus('Reading the puzzle from your image…', 'info');
      solveBtn.disabled = true;
      try {
        const dataUrl = await fileToDataUrl(file);
        const resp = await fetch('/api/parse-sudoku-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: dataUrl }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          setStatus('Couldn\'t read the puzzle: ' + (data.error || resp.status), 'error');
          return;
        }
        writeGrid(data.grid, true);
        const valid = validateBoard();
        setStatus(
          valid
            ? 'Imported! Check the numbers against your screenshot, fix any misreads, then tap Solve.'
            : 'Imported, but some cells conflict (red). The reader may have misread a digit — fix them, then Solve.',
          valid ? 'success' : 'info'
        );
      } catch (err) {
        setStatus('Something went wrong: ' + err.message, 'error');
      } finally {
        solveBtn.disabled = false;
      }
    }

    drop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) importImage(fileInput.files[0]); });

    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault();
      drop.classList.remove('over');
      if (e.dataTransfer.files[0]) importImage(e.dataTransfer.files[0]);
    });

    // Paste an image straight from the clipboard.
    window.addEventListener('paste', (e) => {
      const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
      if (item) importImage(item.getAsFile());
    });
  </script>
</body>
</html>
